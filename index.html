<!DOCTYPE html>
<html lang="pa">
<head>

<body>

<header class="header">

<div class="logo">

<div>
<h1>ਆਪਣਾ ਪਿੰਡ ਡਿਜਿਟਲ</h1>
<p>Online Shopping Mall</p>
</div>
</div>

<nav>
<a href="#">Home</a>
<a href="#categories">Categories</a>
<a href="#contact">Contact</a>
</nav>

</header>

<section class="hero">

<h2>ਤੁਹਾਡਾ ਆਪਣਾ Online Shopping Mall</h2>

<p>
ਇੱਕ ਹੀ ਥਾਂ ਤੇ ਹਰ ਤਰ੍ਹਾਂ ਦਾ ਸਮਾਨ
</p>

<input
type="text"
id="search"

<div class="grid">

WhatsApp Order
</button>
</div>

<div class="card">
<h3>👚 Ladies Stitched Suits</h3>
<p>Ready to Wear</p>
<button onclick="whatsappOrder('Ladies Stitched Suit')">
WhatsApp Order
</button>
</div>

<div class="card">
<h3>👔 Gents Readymade</h3>
<p>ਹਰ ਸਾਈਜ਼ ਉਪਲਬਧ</p>
<button onclick="whatsappOrder('Gents Readymade')">
WhatsApp Order
</button>
</div>

<div class="card">
<h3>👕 Kids Wear</h3>
<p>ਲੜਕੇ ਅਤੇ ਲੜਕੀਆਂ ਲਈ</p>
<button onclick="whatsappOrder('Kids Wear')">
WhatsApp Order
</button>
