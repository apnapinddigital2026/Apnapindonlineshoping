<!DOCTYPE html>
<html lang="pa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਆਪਣਾ ਪਿੰਡ ਡਿਜਿਟਲ Online Shopping Mall</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">

        <div class="logo">

            <img src="logo.png" alt="Logo">

            <div>
                <h1>ਆਪਣਾ ਪਿੰਡ ਡਿਜਿਟਲ</h1>
                <p>Online Shopping Mall</p>
            </div>

        </div>

        <nav>

            <a href="#">Home</a>

            <a href="#products">Products</a>

            <a href="#contact">Contact</a>

        </nav>

    </header>

    <!-- Hero -->

    <section class="hero">

        <h2>ਤੁਹਾਡਾ ਆਪਣਾ Online Shopping Mall</h2>

        <p>ਇੱਕ ਹੀ ਥਾਂ ਤੇ ਹਰ ਤਰ੍ਹਾਂ ਦਾ ਸਮਾਨ ਖਰੀਦੋ</p>

        <input
            type="text"
            id="search"
            placeholder="ਪ੍ਰੋਡਕਟ ਖੋਜੋ..."
            onkeyup="searchProducts()">

    </section>

    <!-- Products -->

    <section class="products-section" id="products">

        <h2>ਸਾਡੇ Products</h2>

        <div id="products" class="grid"></div>

    </section>

    <!-- Footer -->

    <footer id="contact">

        <h2>ਆਪਣਾ ਪਿੰਡ ਡਿਜਿਟਲ</h2>

        <p>📍 VPO Kala Bala, District Gurdaspur, Punjab -143528</p>

        <p>📞 9607718703</p>

        <p>💬 WhatsApp : 9607718703</p>

    </footer>

    <!-- WhatsApp Button -->

    <a
        class="whatsapp"
        href="https://wa.me/919607718703"
        target="_blank">

        💬 WhatsApp

    </a>

    <!-- JavaScript -->

    <script src="products/products.js"></script>

    <script src="script.js"></script>

</body>

</html>
