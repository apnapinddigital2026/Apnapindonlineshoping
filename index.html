<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apna Pind Digital Online Shopping Mall</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ==========================
HEADER
========================== -->

<header class="header">

<div class="logo-area">

<img src="images/logo/logo.png"
id="site-logo"
alt="Logo">

<div>

<h1>APNA PIND DIGITAL</h1>

<p>ONLINE SHOPPING MALL</p>

</div>

</div>

<nav>

<ul>

<li><a href="#">Home</a></li>

<li><a href="#categories">Categories</a></li>

<li><a href="#offers">Offers</a></li>

<li>

<a href="cart.html">

🛒 Cart

<span id="cart-count">

0

</span>

</a>

</li>

<li>

<a href="admin.html">

Admin

</a>

</li>

</ul>

</nav>

</header>

<!-- ==========================
SEARCH BAR
========================== -->

<section class="search-section">

<input

type="text"

id="searchBox"

placeholder="Search Product Name / Code"

onkeyup="searchProducts()">

<button onclick="searchProducts()">

Search

</button>

</section>

<!-- ==========================
BANNER
========================== -->

<section class="banner">

<img

id="banner-image"

src="images/logo/banner.jpg"

alt="Banner">

</section>

<!-- ==========================
CATEGORY SECTION
========================== -->

<section
class="categories"
id="categories">

<h2>

SHOP BY CATEGORY

</h2>

<div class="category-grid">

<button
onclick="filterCategory('ladies')">

Ladies Wear

</button>

<button
onclick="filterCategory('gents')">

Gents Wear

</button>

<button
onclick="filterCategory('ladies-handbags')">

Ladies Handbags

</button>

<button
onclick="filterCategory('kids')">

Kids Wear

</button>

<button
onclick="filterCategory('footwear')">

Footwear

</button>

<button
onclick="filterCategory('electronics')">

Electronics

</button>

<button
onclick="filterCategory('grocery')">

Grocery

</button>

<button
onclick="filterCategory('home-kitchen')">

Home & Kitchen

</button>

<button
onclick="filterCategory('all')">

All Products

</button>

</div>

</section>
