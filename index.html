<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Apna Pind Digital Online Shopping Mall</title>

    <meta name="description"
        content="Apna Pind Digital Online Shopping Mall">

    <link rel="icon"
        type="image/png"
        href="images/logo/IMG_20260629_002124.png">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- ==========================
     HEADER START
========================== -->

<header class="header">

    <div class="logo">

        <img src="images/logo/IMG_20260629_002124.png"
            alt="Logo">

        <div class="logo-text">

            <h1>Apna Pind</h1>

            <p>Digital Online Shopping Mall</p>

        </div>

    </div>

    <nav>

        <a href="#">Home</a>

        <a href="#categories">Categories</a>

        <a href="#products">Products</a>

        <a href="#offers">Offers</a>

        <a href="#contact">Contact</a>

        <a href="cart.html">

            <i class="fa-solid fa-cart-shopping"></i>

            Cart

        </a>

    </nav>

</header>

<!-- ==========================
     HEADER END
========================== -->
<!-- ==========================
     HERO SECTION START
========================== -->

<section class="hero">

    <img
        src="images/banner/IMG_20260703_001627.png"
        alt="Apna Pind Banner"
        class="hero-banner">

    <div class="hero-content">

        <h2>Welcome to Apna Pind Digital Online Shopping Mall</h2>

        <p>
            Ladies Wear • Gents Wear • Kids Wear • Grocery • Electronics •
            Footwear • Cosmetics • Home & Kitchen • Jewellery • Toys
        </p>

        <div class="search-box">

            <input
                type="text"
                id="search"
                placeholder="Search Products...">

            <button id="searchBtn">

                <i class="fa-solid fa-magnifying-glass"></i>

                Search

            </button>

        </div>

        <a href="#products" class="shop-btn">
            Shop Now
        </a>

    </div>

</section>

<!-- ==========================
     HERO SECTION END
========================== -->
