<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details | APNA PIND DIGITAL</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.header{
background:#0057c8;
color:#fff;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo-area{
display:flex;
align-items:center;
gap:10px;
}

.logo-area img{
width:60px;
height:60px;
border-radius:50%;
}

.product-details-container{
max-width:1200px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:10px;
display:flex;
flex-wrap:wrap;
gap:20px;
}

.product-image{
flex:1;
min-width:300px;
text-align:center;
}

.product-image img{
width:100%;
max-width:450px;
border-radius:10px;
}

.product-info{
flex:1;
min-width:300px;
}

.btn{
padding:12px;
border:none;
width:100%;
margin-top:10px;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

.btn-cart{
background:#28a745;
color:#fff;
}

.btn-buy{
background:#dc3545;
color:#fff;
}

.btn-upi{
background:#ff9800;
color:#fff;
}

</style>

</head>

<body>

<header class="header">

<div class="logo-area">

<img src="images/logo/IMG_20260629_002124.png">

<div>

<h2>APNA PIND DIGITAL</h2>

<p>ONLINE SHOPPING MALL</p>

</div>

</div>

</header>

<div class="product-details-container">

<div class="product-image">

<img id="productImage">

</div>

<div class="product-info">

<h2 id="productName"></h2>

<p id="productCode"></p>

<h3 id="productPrice"></h3>

<p id="oldPrice"></p>

<p id="offerBadge"></p>

<p id="stockBadge"></p>

<p id="productDescription"></p>

<button class="btn btn-cart" id="cartBtn">
🛒 Add To Cart
</button>

<button class="btn btn-buy" id="buyBtn">
⚡ Buy Now
</button>

<button class="btn btn-upi" id="upiBtn">
💳 Pay Online (UPI)
</button>

</div>

</div>

<!-- RELATED PRODUCTS -->

<section class="products-section">

<h2>🛍 Related Products / ਸੰਬੰਧਿਤ ਪ੍ਰੋਡਕਟ</h2>

<div id="relatedProducts" class="product-container">

</div>

</section>

<!-- FOOTER -->

<footer style="background:#0057c8;color:#fff;padding:20px;text-align:center;">

<h2>Apna Pind Digital Online Shopping Mall</h2>

<p>ਆਪਣਾ ਪਿੰਡ ਡਿਜ਼ਿਟਲ Online Shopping Mall</p>

<p>📍 Punjab | ਪੰਜਾਬ</p>

<p>📞 Customer Care : +91 8872776620</p>

<p>💬 WhatsApp : +91 8872776620</p>

<p>© 2026 Apna Pind Digital Online Shopping Mall</p>

</footer>

<script src="product.js"></script>
<script src="script.js"></script>
<script src="cart.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const code = params.get("code");

const product = products.find(p => p.code === code);

if(product){

document.getElementById("productImage").src = product.image;

document.getElementById("productName").innerText = product.name;

document.getElementById("productCode").innerText = "Code : " + product.code;

document.getElementById("productPrice").innerText = "₹" + product.price;

document.getElementById("oldPrice").innerHTML = "<del>₹"+product.oldPrice+"</del>";

document.getElementById("offerBadge").innerText = product.offer;

document.getElementById("stockBadge").innerText = product.stock;

document.getElementById("productDescription").innerText = product.description;

document.getElementById("cartBtn").onclick = ()=>addToCart(product.code);

document.getElementById("buyBtn").onclick = ()=>buyNow(product.code);

document.getElementById("upiBtn").onclick = ()=>window.location.href="payment.html";

}

updateCartCount();

</script>

</body>
</html>
