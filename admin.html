<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apna Pind Admin Panel</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#6a1b9a;
}

.card{
margin-top:20px;
padding:20px;
border:1px solid #ddd;
border-radius:10px;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
box-sizing:border-box;
}

button{
background:#6a1b9a;
color:#fff;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
margin-right:8px;
}

button:hover{
background:#4a148c;
}

</style>

</head>

<body>

<div class="container">

<h1>🛒 Apna Pind Admin Panel</h1>

<div class="card">

<h2>Add Product</h2>

<input id="name" type="text" placeholder="Product Name">

<input id="code" type="text" placeholder="Product Code">

<input id="category" type="text" placeholder="Category">

<input id="color" type="text" placeholder="Colour">

<input id="size" type="text" placeholder="Size">

<input id="oldPrice" type="number" placeholder="Old Price">

<input id="price" type="number" placeholder="New Price">

<input id="offer" type="text" placeholder="Offer">

<input id="image" type="text" placeholder="Image Path">

<textarea id="description" placeholder="Description"></textarea>

<button onclick="addProduct()">➕ Add Product</button>

</div>

<div class="card">

<h2>Manage Website</h2>

<button>🖼 Change Banner</button>

<button>🏷 Update Offer</button>

<button>💰 Update Price</button>

<button>🗑 Delete Product</button>

<button>📦 Stock Update</button>

</div>

</div>

<script>

const password = prompt("Enter Admin Password");

if(password !== "ApnaPind@2026"){

alert("Wrong Password!");

window.location.href="index.html";

}

</script>

<script src="admin.js"></script>

</body>
</html>
