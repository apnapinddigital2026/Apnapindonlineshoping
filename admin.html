<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apna Pind Digital Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:#ffffff;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#6a1b9a;
margin-bottom:25px;
}

.card{
background:#fafafa;
border:1px solid #ddd;
border-radius:10px;
padding:20px;
margin-bottom:25px;
}

.card h2{
margin-bottom:15px;
color:#4a148c;
}

input,
select,
textarea{

width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;

}

button{

background:#6a1b9a;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
margin-right:10px;

}

button:hover{

background:#4a148c;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

table th{

background:#6a1b9a;
color:white;
padding:10px;
border:1px solid #ddd;

}

table td{

padding:10px;
border:1px solid #ddd;
text-align:center;

}

.stock-green{

color:green;
font-weight:bold;

}

.stock-red{

color:red;
font-weight:bold;

}

.stock-orange{

color:#ff6600;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>🛒 APNA PIND DIGITAL ADMIN PANEL</h1>

<div class="card">

<h2>➕ Add New Product</h2>

<input id="code" type="text" placeholder="Product Code">

<input id="name" type="text" placeholder="Product Name">

<input id="category" type="text" placeholder="Category">

<input id="color" type="text" placeholder="Colour">

<input id="size" type="text" placeholder="Size">

<input id="oldPrice" type="number" placeholder="Old Price">

<input id="price" type="number" placeholder="New Price">

<input id="offer" type="text" placeholder="Offer">

<input id="image" type="text" placeholder="Image Path">

<input id="description" type="text" placeholder="Description">

<button onclick="addProduct()">➕ Add Product</button>

</div>
