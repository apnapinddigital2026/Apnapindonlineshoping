<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apna Pind Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#6a1b9a;
margin-bottom:25px;
}

.card{
margin-bottom:25px;
padding:20px;
border:1px solid #ddd;
border-radius:10px;
background:#fafafa;
}

.card h2{
margin-top:0;
color:#4a148c;
}

input,
select{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
background:#6a1b9a;
color:white;
padding:12px 18px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
margin-right:10px;
}

button:hover{
background:#4a148c;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th,
table td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

table th{
background:#6a1b9a;
color:white;
}

.stock-green{
color:green;
font-weight:bold;
}

.stock-red{
color:red;
font-weight:bold;
}

.stock-orange{
color:orange;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>🛒 APNA PIND DIGITAL ADMIN PANEL</h1>
