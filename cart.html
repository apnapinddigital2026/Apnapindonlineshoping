<!DOCTYPE html>
<html lang="en">

<head>

<title>Shopping Cart | Apna Pind Digital</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

</head>

<!-- ========================= -->

<script src="script.js"></script>

if(typeof showCart==="function"){

}
